d it?","EXAMPLE 2 — Company or category (named)?","EXAMPLE 2 — What happened specifically?","EXAMPLE 2 — Why? What system produced it?","EXAMPLE 3 — Company or category (named)?","EXAMPLE 3 — What happened specifically?","EXAMPLE 3 — Why? What system produced it?","What do all three share that is not yet nameable as a trend?"]},{id:"w01-sat-fn-04",num:"04",name:"APPLICATION — What brands should do",note:null,prompts:["Imagine briefing a creative director at 09:00 tomorrow.","What is the first thing you would tell them to stop?","What is the first thing you would tell them to start?","What three questions belong in the brief — non-negotiable?","Which constraint nobody is designing into is the opportunity?","What does success look like in 18 months?","Which brands are best positioned to act on this?","Which brands are most exposed if they do not?"]},{id:"w01-sat-fn-05",num:"05",name:"FRAMEWORK — Can this become a repeatable tool?",note:null,prompts:["Can this observation become a framework?","What is the simplest possible structure — 3 stages? 4 questions?","Does it work as: Triangle / Ladder / Flywheel / Matrix / Spectrum?","What goes inside each stage?","What is the output of running the framework?","What is the one-sentence name for the framework?","How would you teach it in under 2 minutes?","What does it replace that people are currently doing badly?"]},{id:"w01-sat-fn-06",num:"06",name:"LESSON — What you now believe that you did not before",note:null,prompts:["What did you personally misunderstand about this early in your career?","What specific project or moment changed your thinking?","What did you believe then that you know was wrong?","What principle do you now hold because of that experience?","What is the one sentence someone should screenshot?","What would you tell yourself in 2005 about this?","What is the portable principle — works in any category?"]}]},{id:"w01-sat-map",platform:"INTERNAL",badge:"PLANNING",badgeColor:C.midGrey,title:"MAP BOTH WEEKS + LOGISTICS",subtitle:"Post map + scheduling — 60–75 min",timing:"11:00 AM",wordcount:"10 LinkedIn slots + YouTube + IG",context:"Against the 6 sections, map which section feeds which day across W01 and W02. Write one sentence per post slot. Confirm no repetition. Then build the Canva graphic and schedule all posts.",sections:[{id:"w01-sat-map-s1",num:"01",name:"POST MAP — one sentence per slot",note:"If you cannot write a sentence for a slot, that slot does not have enough material yet. Return to the Field Notes draft.",prompts:["W01 MON LinkedIn — one sentence: what is the signal post about?","W01 TUE LinkedIn — one sentence: what is the strategic post about?","W01 WED LinkedIn — one sentence: what is the consulting post about?","W01 THU LinkedIn — one sentence: what is the framework post about?","W01 FRI LinkedIn — one sentence: what is the authority post about?","W02 MON LinkedIn — one sentence: different angle on S.04 Application?","W02 TUE LinkedIn — one sentence: strategic interpretation of S.05 Framework?","W02 WED LinkedIn — one sentence: consulting angle on S.06 Lesson?","W02 THU LinkedIn — one sentence: companion doc to W01 YouTube?","W02 FRI LinkedIn — one sentence: personal narrative from S.06 Lesson?","YouTube essay — one sentence: what is the full argument?","W01 TUE IG — adapted from W01 MON post — one sentence","W01 FRI IG Reel — which SHORTS CLIP from Thursday YouTube?","W02 TUE IG — adapted from W02 MON post — one sentence","W02 FRI IG Reel — SHORTS CLIP 04 from W01 YouTube — confirmed?"]},{id:"w01-sat-map-s2",num:"02",name:"PRODUCTION TASKS",note:"All scheduling must happen today. If it is not scheduled before you leave Saturday, add 30 min to Monday morning.",prompts:["W01 MON hook written — 3 versions — one chosen?","Canva framework graphic built — black bg, gold lines, Courier New, 2x export?","All 5 W01 LinkedIn posts scheduled Mon–Fri 09:00 AM PT?","Beehiiv issue set to publish Sun 08:00 AM PT?","YouTube essay outline mapped — 6 sections, 5 SHO VE LEARNED",subtitle:"Authority post · Text only · Source: Field Notes S.06 (personal narrative)",timing:"09:00 AM PT",wordcount:"~280 WORDS · TEXT ONLY · NO IMAGE",context:"Source: Field Notes Section 06 (Lesson) — the personal narrative angle. Different from W02 Wednesday which used the consulting angle. This is the lived experience version. Must be specific: 2019, a collaboration proposal, a proven model applied to the wrong context.",sections:[{id:"w02-fri-li-s1",num:"01",name:"THE SITUATION — Lines 1–5",note:null,prompts:["What year did this happen?","What collaboration or project specifically?","What looked right on every dimension — consumer overlap, credibility, brief, commercial model?","What did everyone in the room want to do?"]},{id:"w02-fri-li-s2",num:"02",name:"WHAT I THOUGHT THEN — Lines 6–12",note:null,prompts:["What proven model did you apply?","What did the execution produce — be honest about the outcome?","What made you think the model was universal?"]},{id:"w02-fri-li-s3",num:"03",name:"WHAT CHANGED — Lines 13–20",note:null,prompts:["What did you understand afterward about aesthetic credibility vs community-based credibility?","What did 'we never traced the collaboration system back to what it was designed to do' reveal?","What was the assumption that cost you — in one sentence?"]},{id:"w02-fri-li-s4",num:"04",name:"THE LESSON — Lines 21–26",note:"Write as: 'A system that worked before is not evidence it will work now. It is only evidence it worked for a specific problem in a specific context.'",prompts:["Lesson: A system that worked before is not evidence it will work now — what does that mean for your reader's current brief?","The discipline is asking honestly whether this problem is the same one. Most of the time it is not — give one example from any category.","The teams that ask the question are the ones that do not make the same mistake twice — what does that look like in practice?"]},{id:"w02-fri-li-s5",num:"05",name:"CLOSING SIGNAL",note: at-prep-s1",num:"01",name:"SIGNAL SCAN FOR W03",note:"Target 3–5 raw signals for W03. Write them as statements, not questions.",prompts:["What did you observe this week that points toward 'The Core Components'?","W03 Signal 1 — stated as a declarative statement:","W03 Signal 2 — stated as a declarative statement:","W03 Signal 3 — stated as a declarative statement:","W03 Signal 4 (if present):","Which of these is the entry point for Issue 002?"]},{id:"w02-sat-prep-s2",num:"02",name:"W03 MONDAY HOOK — 3 versions",note:"W03 hook: 'Every system is built from the same ingredients.' Write 3 versions. Test aloud — does it stop you? Choose one. This is the only writing task today.",prompts:["HOOK VERSION A — based on 'Every system is built from the same ingredients'","HOOK VERSION B — the uncomfortable implication","HOOK VERSION C — the question it makes unavoidable","Read aloud — which one stops you? Choose one:"]},{id:"w02-sat-prep-s3",num:"03",name:"W03 FIELD NOTES OUTLINE — 6 sections sketched",note:"Sketch only — enough that Sunday is edit and polish, not a first draft. Topic: The Core Components — actors, rules, incentives, feedback loops.",prompts:["S.01 SIGNAL sketch — what is the raw observation for this issue?","S.02 PATTERN sketch — what keeps repeating across categories here?","S.03 EVIDENCE sketch — three named examples (placeholder names OK)","S.04 APPLICATION sketch — what should brands do with this?","S.05 FRAMEWORK sketch — what is the tool this becomes?","S.06 LESSON sketch — what did you misunderstand about this early on?"]},{id:"w02-sat-prep-s4",num:"04",name:"W02 WEEK REVIEW",note:null,prompts:["What performed above expectation this week?","What did not land — and what does that reveal?","Did any comment reveal a need worth exploring in W03?","What was the top-performing post of W02?","Signal log updated — confirmed?"]}]}]}]}];const STREAM_B={id:"stream-b",label:"ALL",type:"FIELD OBSERVATIONS",description:"Discretionary. Not scheduled. Publishes when so
